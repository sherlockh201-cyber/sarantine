<!DOCTYPE html>
<html>
<head>
  <title>Valentine’s</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      padding-top: 100px;
      overflow: hidden;
    }

    h2 {
      color: #ff1e4d;
      font-size: 28px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      position: relative;
      z-index: 1;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e4d;
      transform: scale(1.05);
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
      display: none;
    }

    .success {
      color: #28a745;
      animation: glow 1s infinite alternate;
    }

    .error {
      color: red;
      animation: shake 0.4s;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #28a745; }
      to { text-shadow: 0 0 20px #28a745; }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .heart {
      position: absolute;
      color: rgba(255, 0, 76, 0.6);
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Will you be my Sarantine’s? 💘</h2>

    <form id="valentineForm">
      <input type="radio" id="yes" name="answer" value="yes" required>
      <label for="yes">Yes ❤️</label><br><br>

      <input type="radio" id="no" name="answer" value="no">
      <label for="no">No 💔</label><br><br>

      <button type="submit">Submit 💌</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
  const form = document.getElementById("valentineForm");
  const message = document.getElementById("message");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) return;

    if (selected.value === "yes") {
      message.style.display = "block";
      message.textContent = "💖 Bingo! 💖";
      message.className = "success";
    } else {
      window.location.href = "https://youtu.be/IesCkkvRiUg?si=eDo2IUpZagwjq-DS"; // 
    }
  });

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHeart, 500);
</script>
</body>
</html>
